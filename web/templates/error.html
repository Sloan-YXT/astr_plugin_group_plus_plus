<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问出错</title>
<script>
    (function() {
        var theme = localStorage.getItem('gcp_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();
</script>
<style>
:root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-card: #1a1a1a;
    --bg-hover: #222222;
    --bg-input: #0d0d0d;
    --text-primary: #f0f0f0;
    --text-secondary: #999999;
    --text-muted: #555555;
    --accent-red: #e02020;
    --accent-red-dim: rgba(224,32,32,0.15);
    --accent-green: #22c55e;
    --accent-orange: #e8a838;
    --accent-gray: #555555;
    --border-color: #2a2a2a;
    --glow-red: 0 0 12px rgba(224,32,32,0.3);
    --shadow: 0 2px 12px rgba(0,0,0,0.5);
    --radius: 8px;
    --radius-sm: 4px;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-bg-hover: rgba(255,255,255,0.08);
    --glass-bg-active: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.08);
    --glass-border-hover: rgba(255,255,255,0.15);
    --glass-blur: 12px;
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
    --accent-glow: rgba(224,32,32,0.15);
}

:root[data-theme="light"] {
    --bg-primary: #f5f5f5;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-hover: #e0e0e0;
    --bg-input: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #555555;
    --text-muted: #888888;
    --border-color: #d0d0d0;
    --shadow: 0 2px 12px rgba(0,0,0,0.1);

    --glass-bg: rgba(0,0,0,0.04);
    --glass-bg-hover: rgba(0,0,0,0.08);
    --glass-bg-active: rgba(0,0,0,0.12);
    --glass-border: rgba(0,0,0,0.08);
    --glass-border-hover: rgba(0,0,0,0.15);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
}
.box {
    text-align: center;
    max-width: 480px;
    width: 100%;
    padding: 48px 32px;
    background: var(--bg-card);
    border-radius: 16px;
    border: 1px solid rgba(255, 80, 80, 0.3);
    box-shadow: var(--shadow);
}
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { font-size: 22px; color: var(--accent-red); margin-bottom: 12px; font-weight: 600; }
.code-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 16px;
    background: var(--accent-red-dim);
    color: var(--accent-red);
    border: 1px solid rgba(224, 32, 32, 0.3);
}
.desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 8px;
}
.reason-box {
    margin: 16px 0;
    padding: 10px 14px;
    background: rgba(224, 32, 32, 0.08);
    border: 1px solid rgba(224, 32, 32, 0.2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent-red);
    text-align: left;
    word-break: break-word;
    line-height: 1.6;
}
.reason-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
}
.footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
}
</style>
</head>
<body>
<div class="box">
    <div class="icon" id="err-icon">⚠️</div>
    <div class="code-badge" id="err-badge">ERROR</div>
    <h1 id="err-title">访问出错</h1>
    <p class="desc" id="err-desc">发生了一个错误，请联系管理员。</p>
    <div class="reason-box" id="err-reason-box" style="display:none;">
        <div class="reason-label">原因</div>
        <div id="err-reason"></div>
    </div>
    <div class="footer">
        如果您认为这是误操作，请联系系统管理员。
    </div>
</div>

<script>
(function() {
    // 读取服务端注入的数据（由 _load_error_page 方法内联注入）
    // 若为占位符则降级到 URL 参数
    var code = '__ERROR_CODE__';
    var reason = '__ERROR_REASON__';

    // 检测是否仍为占位符（服务端未替换时的降级处理）
    if (!code || code === '__ERROR_CODE__') {
        var params = new URLSearchParams(window.location.search);
        code = params.get('code') || 'error';
        // 安全解码 reason（仅作文本展示，不执行）
        var rawReason = params.get('reason') || '';
        // 纯文本处理，防止 XSS
        reason = rawReason;
    }

    var icon, badge, title, desc;

    if (code === 'blocked') {
        icon = '🚫';
        badge = '403 BLOCKED';
        title = '访问被拒绝';
        desc = '您的 IP 地址无法访问此面板，可能已被封禁或不在访问名单中。';
        document.querySelector('.box').style.borderColor = 'rgba(255,80,80,0.4)';
    } else if (code === '403') {
        icon = '🔒';
        badge = '403 FORBIDDEN';
        title = '禁止访问';
        desc = '您没有权限访问此资源。';
        document.querySelector('.box').style.borderColor = 'rgba(255,150,50,0.4)';
    } else if (code === '404') {
        icon = '🔍';
        badge = '404 NOT FOUND';
        title = '页面不存在';
        desc = '您访问的页面不存在，请检查地址是否正确。';
        document.querySelector('.box').style.borderColor = 'rgba(100,100,200,0.4)';
    } else {
        icon = '⚠️';
        badge = 'ERROR';
        title = '访问出错';
        desc = '发生了一个错误，请联系管理员。';
    }

    document.getElementById('err-icon').textContent = icon;
    document.getElementById('err-badge').textContent = badge;
    document.getElementById('err-title').textContent = title;
    document.getElementById('err-desc').textContent = desc;

    // 安全展示 reason（纯文本，无 innerHTML）
    if (reason) {
        var reasonBox = document.getElementById('err-reason-box');
        var reasonEl = document.getElementById('err-reason');
        reasonEl.textContent = reason;
        reasonBox.style.display = 'block';
    }

    // 动态设置页面标题
    document.title = title;
})();
</script>
</body>
</html>
